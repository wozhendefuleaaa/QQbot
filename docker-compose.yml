version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: qqbot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qqbot
      MYSQL_USER: qqbot
      MYSQL_PASSWORD: qqbot
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4
    container_name: qqbot-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  backend:
    image: node:20-alpine
    container_name: qqbot-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev -w backend"
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "3001:3000"
    depends_on:
      - mysql
      - redis

  webui:
    image: node:20-alpine
    container_name: qqbot-webui
    working_dir: /app
    command: sh -c "npm install && npm run dev -w webui -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
