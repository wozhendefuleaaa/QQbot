services:
  mysql:
    image: mysql:8.4
    container_name: qqbot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qqbot
      MYSQL_USER: qqbot
      MYSQL_PASSWORD: qqbot
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4
    container_name: qqbot-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # QQBot Platform - 统一服务（同时运行 backend + webui）
  qqbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qqbot-platform
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=qqbot
      - DB_PASSWORD=qqbot
      - DB_NAME=qqbot
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"   # 前端界面 + 后端 API（同端口）
    volumes:
      # 插件目录持久化
      - ./backend/plugins:/app/backend/plugins
      - ./backend/src/plugins:/app/backend/src/plugins
      # 数据库文件（可选，用于 SQLite）
      - qqbot_data:/app/data
      # 日志持久化
      - qqbot_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  qqbot_data:
  qqbot_logs:
